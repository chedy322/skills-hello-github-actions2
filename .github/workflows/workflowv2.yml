name: Ci on docker

on:
    push:
        branches: ["new-branch2"]
        paths-ignore: ["*.md"]  

jobs:
    lint:
        runs-on: ubunto-latest
        steps:
            # chechkout the code
            -   name: Checkout the code
                uses: actions/checkout@v4
            -   name: Set up node js
                uses:  actions/setup-node@v4
                with:
                    node-version: 20.x
                    cache: npm
            -   name: Install dependecies
                run: npm install
            -   name: Run lint test
                run: npm run lint 

    build-and-push-docker-image:
        needs:  [lint]
        if: success()
        runs-on: ubuntu-latest
        environment: Docker
        steps:
            # checkout the code
            -   name: Checkout the code repo
                uses: actions/checkout@v4
            -   name: Login to docker
                uses: docker/login-action@v3
                with: 
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}
                
            -   name: Docker meta tags
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: ${{secrets.DOCKER_USERNAME}}/my-app

            -   name: Build image and push it to registry
                uses: docker/build-push-action@v5
                with:
                    context: .
                    push: ${{github.event_name!='pull_request'}}
                    tags: ${{steps.meta.outputs.tags}}
                        
    deploy-image-to-Render:

        needs: [build-and-push-docker-image]

        if: github.ref=='refs/heads/new-branch2' && success()

        runs-on: ubuntu-latest

        environment: Production

        steps:

            -   name: Depoly to Render

                uses: johnbeynon/render-deploy-action@v0.0.8

                

                with:

                    api-key: ${{ secrets.RENDER_API_KEY }}

                    service-id: ${{ secrets.RENDER_SERVICE_ID }}
    
