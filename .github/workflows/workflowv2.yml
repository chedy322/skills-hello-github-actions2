name: Ci on docker

on:
    push:
        branches: ["new-branch2"]
        paths-ignore: ["*.md"]  

jobs:
    build-and-push-docker-image:
        runs-on: ubuntu-latest
        environment: Docker
        steps:
            # checkout the code
            -   name: Checkout the code repo
                uses: actions/checkout@v4
            -   name: Login to docker
                uses: docker/login-action@v3
                with: 
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}
                

            -   name: Build image and push it to registry
                uses: docker/build-push-action@v5
                with:
                    context: .
                    push: true
                    tags: |
                        ${{ secrets.DOCKER_USERNAME }}/my-app:latest
                        ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}
    deploy-image-to-Render:

        needs: [build-and-push-docker-image]

        if: github.ref=='refs/heads/new-branch' && success()

        runs-on: ubuntu-latest

        environment: Production

        steps:

            -   name: Depoly to Render

                uses: johnbeynon/render-deploy-action@v0.0.8

                

                with:

                    api-key: ${{ secrets.RENDER_API_KEY }}

                    service-id: ${{ secrets.RENDER_SERVICE_ID }}
    
