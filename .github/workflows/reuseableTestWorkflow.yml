name: Test workflow

on:
    workflow_call:
        inputs:
            node-version:
                type: string
                required: true
                default: 20.x
            os:
                type: string
                required: true

            
jobs:
    reusabletest:
        name: Run tests
        runs-on: ${{ inputs.os }}
        steps:
            # checkout the code
            - name: Checkout the code repo
              uses: actions/checkout@v4
            
            # setup node 
            - name: Setup node version ${{ inputs.node-version }}
              uses: actions/setup-node@v4
              with:
                node-version: ${{ inputs.node-version }}
                cache: 'npm'

            # install dependecies
            - name: Install node depencdicies and run tests
              run: |
                npm ci
                npm test

            - name: Create artifact logs
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: test-results-${{ inputs.os }}-${{ inputs.node-version }}
                path: coverage/









