name: CI Pipeline

on:
  push:
    branches: ["new-branch"]
    paths-ignore: ["*.md"]  
  pull_request:
    branches: ["new-branch"]

env: 
  Name: first workflow

jobs:
  test:
    name: Run tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x, 22.x] 
      fail-fast: false
    uses: ./.github/workflows/reuseableTestWorkflow.yml
    with:
      node-version: ${{matrix.node-version}}
      os: ${{matrix.os}}



    
  build:
    # This only runs if 'test' passes successfully
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present

  deployment:
    needs: [test,build]
    name: Deploy to production 
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Use Secrets and Variables
        env:
          API_URL: ${{secrets.API_URL}}
          APPLICATION_NAME: ${{vars.APPLICATION_NAME}}
        run: |
          echo "Launching $APPLICATION_NAME..."
          echo "Api url: $API_URL"


